<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acknowledgements</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-gradient: linear-gradient(180deg, #050505 0%, #121214 100%);
    --text-main: #f5f5f7;
    --text-muted: #86868b;
    --text-hint: #424245;
  }

  body {
    margin: 0;
    background: var(--bg-gradient);
    color: var(--text-main);
    font-family: "Plus Jakarta Sans", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    box-sizing: border-box;
    padding: 60px 20px;
    overflow-x: hidden;
  }

  /* # Sfondo con texture radiale soffusa */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at 50% 35%, rgba(255,255,255,0.015) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 800px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 1;
  }

  /* # Animazione d'ingresso stile titoli di testa */
  h1 {
    font-family: "Playfair Display", serif;
    font-size: clamp(42px, 6vw, 68px);
    font-weight: 500;
    letter-spacing: -0.01em;
    margin-bottom: 10px;
    background: linear-gradient(to bottom, #ffffff 30%, #cccccc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    opacity: 0;
    transform: translateY(40px);
    animation: cinematicEntrance 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  p.subtitle {
    font-size: clamp(16px, 2vw, 19px);
    font-weight: 300;
    color: var(--text-muted);
    line-height: 1.6;
    max-width: 600px;
    margin-bottom: 8px;
    opacity: 0;
    transform: translateY(30px);
    animation: cinematicEntrance 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    animation-delay: 0.4s;
  }

  /* # Micro hint interattivo discreto */
  .audio-hint {
    font-size: 12px;
    letter-spacing: 0.05em;
    color: var(--text-hint);
    margin-bottom: 50px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeInHint 1.5s ease forwards;
    animation-delay: 1.8s;
    transition: color 0.3s ease;
  }

  .audio-hint.playing {
    color: transparent;
    height: 0;
    margin-bottom: 50px;
    pointer-events: none;
  }

  /* # Contenitore immagine con capienza premium e transizione morbida */
  .image-wrapper {
    position: relative;
    width: 100%;
    max-width: 680px;
    border-radius: 24px;
    padding: 10px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 40px 120px rgba(0,0,0,0.85), 
                inset 0 1px 0 rgba(255,255,255,0.05);
    opacity: 0;
    transform: translateY(50px) scale(0.97);
    animation: cinematicEntrance 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    animation-delay: 0.9s;
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.5s ease;
    overflow: hidden;
  }

  .image-wrapper:hover {
    box-shadow: 0 50px 140px rgba(0,0,0,0.95), 
                0 0 50px rgba(255,255,255,0.01);
  }

  img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 16px;
    filter: grayscale(25%) brightness(90%);
    transition: filter 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .image-wrapper:hover img {
    filter: grayscale(0%) brightness(100%);
  }

  /* # Player audio minimale (Isola in basso) */
  .music-player {
    position: fixed;
    bottom: 35px;
    right: 35px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 22px;
    border-radius: 100px;
    background: rgba(10, 10, 10, 0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    cursor: pointer;
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    user-select: none;
    z-index: 10;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    opacity: 0;
    animation: fadeInHint 1.5s ease forwards;
    animation-delay: 1.2s;
  }

  .music-player:hover {
    transform: translateY(-4px);
    border-color: rgba(255, 255, 255, 0.18);
    background: rgba(15, 15, 15, 0.85);
  }

  #icon {
    font-size: 11px;
    width: 12px;
    display: inline-block;
    text-align: center;
  }

  .player-text {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 500;
    color: var(--text-muted);
    transition: color 0.3s ease;
  }
  
  .music-player:hover .player-text {
    color: var(--text-main);
  }

  .waves {
    display: flex;
    gap: 3px;
    height: 14px;
    align-items: flex-end;
  }

  .waves span {
    width: 2px;
    height: 2px;
    background: #fff;
    border-radius: 1px;
    transition: height 0.4s ease;
  }

  .waves.active span {
    animation: wave 1.2s infinite ease-in-out;
  }
  .waves.active span:nth-child(1) { animation-delay: 0.1s; }
  .waves.active span:nth-child(2) { animation-delay: 0.3s; }
  .waves.active span:nth-child(3) { animation-delay: 0.5s; }

  @keyframes wave {
    0%, 100% { height: 2px; }
    50% { height: 14px; }
  }

  /* # Keyframes per l'apertura fluida */
  @keyframes cinematicEntrance {
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  @keyframes fadeInHint {
    to { opacity: 1; }
  }

  /* Mobile responsive layout */
  @media (max-width: 768px) {
    .music-player {
      bottom: 25px;
      right: 50%;
      transform: translateX(50%);
    }
    .music-player:hover {
      transform: translateX(50%) translateY(-2px);
    }
  }
</style>
</head>

<body>

<div class="container">
  <h1>Acknowledgements</h1>
  <p class="subtitle">Acknowledgements will arrive soon…</p>
  <div class="audio-hint" id="hint-text">↳ Click the player to enable sound</div>

  <div class="image-wrapper" id="tilt-card">
    <img src="image.jpg" alt="Laboratory memory">
  </div>
</div>

<div class="music-player" onclick="toggleMusic()">
  <span id="icon">▶</span>
  <span class="player-text">Memory</span>
  <div class="waves" id="waves">
    <span></span><span></span><span></span>
  </div>
</div>

<audio id="bgmusic" loop>
  <source src="coffee.mp3" type="audio/mpeg">
</audio>

<script>
let isPlaying = false;
let fadeInterval = null;
const audio = document.getElementById("bgmusic");
const icon = document.getElementById("icon");
const waves = document.getElementById("waves");
const hintText = document.getElementById("hint-text");

// # Gestione Fade-In / Fade-Out reale del volume
function fadeAudio(targetVolume, duration, callback) {
  clearInterval(fadeInterval);
  const startVolume = audio.volume;
  const steps = 20;
  const stepTime = duration / steps;
  const volumeStep = (targetVolume - startVolume) / steps;
  let currentStep = 0;

  fadeInterval = setInterval(() => {
    currentStep++;
    let nextVolume = startVolume + (volumeStep * currentStep);
    
    // Evita overflow nei limiti dell'oggetto audio
    if (nextVolume > 1) nextVolume = 1;
    if (nextVolume < 0) nextVolume = 0;
    
    audio.volume = nextVolume;

    if (currentStep >= steps) {
      clearInterval(fadeInterval);
      audio.volume = targetVolume;
      if (callback) callback();
    }
  }, stepTime);
}

function toggleMusic() {
  if (!isPlaying) {
    audio.volume = 0;
    audio.play()
      .then(() => {
        fadeAudio(1, 1500); // Dissolvenza in 1.5 secondi
        icon.textContent = "❚❚";
        waves.classList.add("active");
        hintText.classList.add("playing");
      })
      .catch(() => {
        console.log("User interaction required for audio playback");
      });
  } else {
    // Dissolvenza in uscita prima di mettere in pausa
    fadeAudio(0, 1000, () => {
      audio.pause();
    });
    icon.textContent = "▶";
    waves.classList.remove("active");
  }
  isPlaying = !isPlaying;
}

// # Parallasse desktop cinematico (sensibilità ridotta a 70 per massima stabilità)
const card = document.getElementById('tilt-card');
if (window.innerWidth > 768) {
  document.addEventListener('mousemove', (e) => {
    const xAxis = (window.innerWidth / 2 - e.pageX) / 70;
    const yAxis = (window.innerHeight / 2 - e.pageY) / 70;
    card.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
  });
  
  document.addEventListener('mouseleave', () => {
    card.style.transform = `rotateY(0deg) rotateX(0deg)`;
  });
}
</script>

</body>
</html>
