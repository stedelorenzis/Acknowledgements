<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Acknowledgements</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: linear-gradient(180deg, #0f0f0f, #1a1a1a);
    color: #f5f5f5;
    font-family: "Inter", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
  }

  h1 {
    font-family: "Playfair Display", serif;
    font-size: 52px;
    margin-bottom: 15px;
    opacity: 0;
    animation: fadeIn 1.5s ease forwards;
  }

  p {
    font-size: 18px;
    opacity: 0;
    margin-bottom: 30px;
    animation: fadeIn 2.2s ease forwards;
    animation-delay: 0.4s;
  }

  img {
    max-width: 650px;
    width: 90%;
    border-radius: 18px;
    box-shadow: 0 25px 70px rgba(0,0,0,0.5);
    opacity: 0;
    animation: fadeIn 3s ease forwards;
    animation-delay: 0.9s;
  }

  /* 🎧 MUSIC PLAYER */
  .music-player {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    cursor: pointer;
    transition: all 0.3s ease;
    user-select: none;
  }

  .music-player:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.1);
  }

  #icon {
    font-size: 14px;
  }

  .waves {
    display: flex;
    gap: 3px;
    height: 12px;
    align-items: flex-end;
    opacity: 0.4;
  }

  .waves span {
    width: 2px;
    height: 4px;
    background: #fff;
    animation: wave 1s infinite ease-in-out;
  }

  .waves span:nth-child(2) { animation-delay: 0.2s; }
  .waves span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes wave {
    0%, 100% { height: 4px; }
    50% { height: 14px; }
  }

  .waves.active {
    opacity: 1;
  }

  /* 🎬 FADE */
  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
    from { opacity: 0; transform: translateY(20px); }
  }
</style>
</head>

<body>

<!-- 🎧 MUSIC -->
<div class="music-player" onclick="toggleMusic()">
  <span id="icon">▶</span>
  <div class="waves" id="waves">
    <span></span><span></span><span></span>
  </div>
</div>

<h1>Acknowledgements</h1>

<p>Acknowledgements will arrive soon…</p>

<img src="image.jpg" alt="Laboratory memory">

<audio id="bgmusic" loop>
  <source src="coffee.mp3" type="audio/mpeg">
</audio>

<script>
let isPlaying = false;
const audio = document.getElementById("bgmusic");
const icon = document.getElementById("icon");
const waves = document.getElementById("waves");

function toggleMusic() {
  if (!isPlaying) {
    audio.play();
    icon.textContent = "❚❚";
    waves.classList.add("active");
  } else {
    audio.pause();
    icon.textContent = "▶";
    waves.classList.remove("active");
  }
  isPlaying = !isPlaying;
}
</script>

</body>
</html>
