<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Acknowledgements</title>

<!-- Font elegante da Google -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: linear-gradient(180deg, #0f0f0f, #1c1c1c);
    color: #f5f5f5;
    font-family: "Inter", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
  }

  h1 {
    font-family: "Playfair Display", serif;
    font-size: 48px;
    margin-bottom: 20px;
    letter-spacing: 1px;
    animation: fadeIn 2s ease-in-out;
  }

  p {
    font-size: 18px;
    opacity: 0.85;
    margin-bottom: 30px;
    animation: fadeIn 3s ease-in-out;
  }

  img {
    max-width: 600px;
    width: 90%;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    animation: fadeIn 4s ease-in-out;
  }

  .footer {
    margin-top: 40px;
    font-size: 14px;
    opacity: 0.5;
    animation: fadeIn 5s ease-in-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

</head>

<body>

  <h1>Acknowledgements</h1>

  <p>Acknowledgements will arrive soon…</p>

  <img src="image.jpg" alt="">

  <div class="footer">
    A hidden page from the thesis
  </div>

</body>
</html>
