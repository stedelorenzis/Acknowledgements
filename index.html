<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Acknowledgements</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: linear-gradient(180deg, #0f0f0f, #1c1c1c);
    color: #f5f5f5;
    font-family: "Inter", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
  }

  h1 {
    font-family: "Playfair Display", serif;
    font-size: 48px;
    margin-bottom: 20px;
    letter-spacing: 1px;
    animation: fadeIn 2s ease-in-out;
  }

  p {
    font-size: 18px;
    opacity: 0.85;
    margin-bottom: 30px;
    animation: fadeIn 3s ease-in-out;
  }

  img {
    max-width: 600px;
    width: 90%;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    animation: fadeIn 4s ease-in-out;
  }

  .music-btn {
    margin-top: 25px;
    padding: 12px 22px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    background: rgba(255, 255, 255, 0.05);
    color: #f5f5f5;
    font-family: "Inter", sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
    border-radius: 12px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
  }

  .music-btn:hover {
    background: rgba(255, 255, 255, 0.15);
    transform: translateY(-2px);
  }

  .music-btn:active {
    transform: scale(0.98);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

</head>

<body>

  <h1>Acknowledgements</h1>

  <p>Acknowledgements will arrive soon…</p>

  <img src="image.jpg" alt="Laboratory memory">

  <audio id="bgmusic" loop>
    <source src="coffee.mp3" type="audio/mpeg">
  </audio>

  <button class="music-btn" onclick="document.getElementById('bgmusic').play()">
    ▶ Play music
  </button>

</body>
</html>
