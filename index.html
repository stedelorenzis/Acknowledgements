<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Acknowledgements</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: linear-gradient(180deg, #f5f2ea, #e9e4d8);
    color: #1a1a1a;
    font-family: "Inter", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    overflow: hidden;
  }

  /* 🌟 PARTICELLE */
  .particles {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .particles span {
    position: absolute;
    display: block;
    width: 3px;
    height: 3px;
    background: rgba(0,0,0,0.08);
    border-radius: 50%;
    animation: float 12s linear infinite;
  }

  @keyframes float {
    from { transform: translateY(100vh); opacity: 0; }
    to { transform: translateY(-10vh); opacity: 1; }
  }

  /* 🎬 FADE SEQUENZIALE */
  h1 {
    font-family: "Playfair Display", serif;
    font-size: 52px;
    margin-bottom: 15px;
    opacity: 0;
    animation: fadeIn 1.5s ease forwards;
  }

  p {
    font-size: 18px;
    opacity: 0;
    margin-bottom: 30px;
    animation: fadeIn 2.5s ease forwards;
    animation-delay: 0.6s;
  }

  img {
    max-width: 650px;
    width: 90%;
    border-radius: 18px;
    box-shadow: 0 25px 70px rgba(0,0,0,0.15);
    opacity: 0;
    animation: fadeIn 3.5s ease forwards;
    animation-delay: 1.2s;
  }

  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
    from { opacity: 0; transform: translateY(20px); }
  }

  /* 🎧 MUSIC */
  .music-player {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 999px;
    background: rgba(0,0,0,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0,0,0,0.1);
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .music-player:hover {
    transform: scale(1.05);
  }

  .waves {
    display: flex;
    gap: 3px;
    height: 12px;
    align-items: flex-end;
    opacity: 0.4;
  }

  .waves span {
    width: 2px;
    height: 4px;
    background: #111;
    animation: wave 1s infinite ease-in-out;
  }

  .waves span:nth-child(2) { animation-delay: 0.2s; }
  .waves span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes wave {
    0%, 100% { height: 4px; }
    50% { height: 14px; }
  }

  .waves.active { opacity: 1; }

  /* 📜 HIDDEN SECTION */
  .extra {
    margin-top: 20px;
    font-size: 14px;
    cursor: pointer;
    opacity: 0.6;
    text-decoration: underline;
  }

  .hidden {
    display: none;
    margin-top: 15px;
    max-width: 600px;
    font-size: 15px;
    opacity: 0.85;
  }

</style>
</head>

<body>

<!-- 🌟 PARTICLE BACKGROUND -->
<div class="particles" id="particles"></div>

<!-- 🎧 MUSIC -->
<div class="music-player" onclick="toggleMusic()">
  <span id="icon">▶</span>
  <div class="waves" id="waves">
    <span></span><span></span><span></span>
  </div>
</div>

<h1>Acknowledgements</h1>

<p>Acknowledgements will arrive soon…</p>

<img src="image.jpg" alt="Laboratory memory">

<div class="extra" onclick="toggleExtra()">Extended acknowledgements</div>

<div class="hidden" id="extraText">
  This page exists as a small space beyond the thesis limits.
  A place for all the people and moments that could not fit on paper,
  but belong fully to this journey.
</div>

<audio id="bgmusic" loop>
  <source src="coffee.mp3" type="audio/mpeg">
</audio>

<script>
/* 🎧 MUSIC */
let isPlaying = false;
const audio = document.getElementById("bgmusic");
const icon = document.getElementById("icon");
const waves = document.getElementById("waves");

function toggleMusic() {
  if (!isPlaying) {
    audio.play();
    icon.textContent = "❚❚";
    waves.classList.add("active");
  } else {
    audio.pause();
    icon.textContent = "▶";
    waves.classList.remove("active");
  }
  isPlaying = !isPlaying;
}

/* 📜 EXTRA SECTION */
function toggleExtra() {
  const el = document.getElementById("extraText");
  el.style.display = el.style.display === "block" ? "none" : "block";
}

/* ✨ PARTICLES */
const container = document.getElementById("particles");

for (let i = 0; i < 30; i++) {
  const s = document.createElement("span");
  s.style.left = Math.random() * 100 + "vw";
  s.style.animationDuration = (6 + Math.random() * 10) + "s";
  s.style.opacity = Math.random();
  container.appendChild(s);
}
</script>

</body>
</html>
