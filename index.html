<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acknowledgements</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-main: #030303;
    --text-main: #f5f5f7;
    --text-muted: #86868b;
    --text-hint: #3a3a3c;
    --cubic-premium: cubic-bezier(0.25, 1, 0.5, 1);
  }

  body {
    margin: 0;
    background-color: var(--bg-main);
    color: var(--text-main);
    font-family: "Plus Jakarta Sans", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    box-sizing: border-box;
    padding: 60px 20px;
    overflow-x: hidden;
  }

  /* # Sfondo radiale quasi impercettibile */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.012) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 800px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 1;
  }

  /* # Stile scritte: focus sull'eleganza tipografica dei titoli di testa */
  h1 {
    font-family: "Playfair Display", serif;
    font-size: clamp(38px, 5.5vw, 62px);
    font-weight: 400;
    letter-spacing: 0.02em;
    margin-bottom: 12px;
    background: linear-gradient(to bottom, #ffffff 50%, #b5b5b9 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 2.5s var(--cubic-premium), transform 2.5s var(--cubic-premium);
  }

  p.subtitle {
    font-size: clamp(15px, 1.8vw, 18px);
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: 0.01em;
    line-height: 1.6;
    max-width: 580px;
    margin-bottom: 8px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 2s var(--cubic-premium), transform 2s var(--cubic-premium);
  }

  .audio-hint {
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text-hint);
    margin-bottom: 60px;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 1.5s ease, color 0.4s ease, transform 1s ease;
  }

  .audio-hint.reveal {
    opacity: 1;
  }

  .audio-hint.playing {
    opacity: 0;
    transform: translateY(-10px);
    pointer-events: none;
  }

  /* # Struttura monolitica per l'immagine memory */
  .image-wrapper {
    position: relative;
    width: 100%;
    max-width: 660px;
    border-radius: 20px;
    padding: 8px;
    background: rgba(255, 255, 255, 0.01);
    border: 1px solid rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    box-shadow: 0 40px 130px rgba(0,0,0,0.9), 
                inset 0 1px 0 rgba(255,255,255,0.03);
    opacity: 0;
    transform: translateY(60px) scale(0.96);
    transition: opacity 3s var(--cubic-premium), 
                transform 3s var(--cubic-premium), 
                box-shadow 0.6s ease;
    overflow: hidden;
  }

  /* Classe di trigger per l'ingresso coordinato */
  .visible {
    opacity: 1 !important;
    transform: translateY(0) scale(1) !important;
  }

  .image-wrapper:hover {
    box-shadow: 0 60px 150px rgba(0,0,0,0.95), 
                0 0 40px rgba(255,255,255,0.01);
  }

  img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 14px;
    filter: grayscale(40%) brightness(85%);
    transition: filter 1.2s var(--cubic-premium);
  }

  .image-wrapper:hover img {
    filter: grayscale(0%) brightness(100%);
  }

  /* # Player audio minimale (Dynamic Floating Island) */
  .music-player {
    position: fixed;
    bottom: 40px;
    right: 40px;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 24px;
    border-radius: 100px;
    background: rgba(8, 8, 8, 0.5);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.05);
    cursor: pointer;
    user-select: none;
    z-index: 10;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 2s var(--cubic-premium), 
                transform 2s var(--cubic-premium), 
                border-color 0.4s ease, 
                background 0.4s ease;
  }

  .music-player:hover {
    transform: translateY(-2px);
    border-color: rgba(255, 255, 255, 0.15);
    background: rgba(12, 12, 14, 0.8);
  }

  #icon {
    font-size: 10px;
    width: 12px;
    display: inline-block;
    text-align: center;
    color: var(--text-main);
  }

  .player-text {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 500;
    color: var(--text-muted);
    transition: color 0.3s ease;
  }
  
  .music-player:hover .player-text {
    color: var(--text-main);
  }

  .waves {
    display: flex;
    gap: 3px;
    height: 14px;
    align-items: flex-end;
  }

  .waves span {
    width: 2px;
    height: 2px;
    background: #fff;
    border-radius: 1px;
    transition: height 0.5s ease;
  }

  .waves.active span {
    animation: wave 1.4s infinite ease-in-out;
  }
  .waves.active span:nth-child(1) { animation-delay: 0.1s; }
  .waves.active span:nth-child(2) { animation-delay: 0.3s; }
  .waves.active span:nth-child(3) { animation-delay: 0.5s; }

  @keyframes wave {
    0%, 100% { height: 2px; }
    50% { height: 14px; }
  }

  /* Mobile layout styling */
  @media (max-width: 768px) {
    .music-player {
      bottom: 30px;
      right: 50%;
      transform: translateX(50%) translateY(20px);
    }
    .music-player.visible:hover {
      transform: translateX(50%) translateY(-2px);
    }
  }
</style>
</head>

<body>

<div class="container">
  <h1 id="title">Acknowledgements</h1>
  <p class="subtitle" id="subtitle">Acknowledgements will arrive soon…</p>
  <div class="audio-hint" id="hint-text">↳ Click the player to enable sound</div>

  <div class="image-wrapper" id="tilt-card">
    <img src="image.jpg" alt="Laboratory memory">
  </div>
</div>

<div class="music-player" id="player" onclick="toggleMusic()">
  <span id="icon">▶</span>
  <span class="player-text">Memory</span>
  <div class="waves" id="waves">
    <span></span><span></span><span></span>
  </div>
</div>

<audio id="bgmusic" loop>
  <source src="coffee.mp3" type="audio/mpeg">
</audio>

<script>
let isPlaying = false;
let fadeInterval = null;

const audio = document.getElementById("bgmusic");
const icon = document.getElementById("icon");
const waves = document.getElementById("waves");
const hintText = document.getElementById("hint-text");

// # REGIA CINEMATOGRAFICA (JS Sequenced Entrance)
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    document.getElementById('title').classList.add('visible');
  }, 400); // 1. Appare il titolo sfumato dal nero

  setTimeout(() => {
    document.getElementById('subtitle').classList.add('visible');
  }, 1200); // 2. Appare il sottotitolo

  setTimeout(() => {
    document.getElementById('player').classList.add('visible');
    hintText.classList.add('reveal');
  }, 2200); // 3. Entra l'interfaccia dell'audio

  setTimeout(() => {
    document.getElementById('tilt-card').classList.add('visible');
  }, 3000); // 4. Sipario finale: la memoria del laboratorio sale lentamente
});

// # FADE AUDIO CINEMATICO (Curva di volume morbida)
function fadeAudio(targetVolume, duration, callback) {
  clearInterval(fadeInterval);
  const startVolume = audio.volume;
  const steps = 30; // Più step per maggiore fluidità nel fade
  const stepTime = duration / steps;
  const volumeStep = (targetVolume - startVolume) / steps;
  let currentStep = 0;

  fadeInterval = setInterval(() => {
    currentStep++;
    let nextVolume = startVolume + (volumeStep * currentStep);
    
    if (nextVolume > 1) nextVolume = 1;
    if (nextVolume < 0) nextVolume = 0;
    
    audio.volume = nextVolume;

    if (currentStep >= steps) {
      clearInterval(fadeInterval);
      audio.volume = targetVolume;
      if (callback) callback();
    }
  }, stepTime);
}

function toggleMusic() {
  if (!isPlaying) {
    audio.volume = 0;
    audio.play()
      .then(() => {
        fadeAudio(1, 2500); // Fade-in esteso a 2.5 secondi (effetto dissolvenza da film)
        icon.textContent = "❚❚";
        waves.classList.add("active");
        hintText.classList.add("playing");
      })
      .catch(() => {
        console.log("User interaction required for audio playback");
      });
  } else {
    fadeAudio(0, 1500, () => {
      audio.pause();
    });
    icon.textContent = "▶";
    waves.classList.remove("active");
  }
  isPlaying = !isPlaying;
}

// # PARALLASSE DESKTOP STABILIZZATO
const card = document.getElementById('tilt-card');
if (window.innerWidth > 768) {
  document.addEventListener('mousemove', (e) => {
    const xAxis = (window.innerWidth / 2 - e.pageX) / 75;
    const yAxis = (window.innerHeight / 2 - e.pageY) / 75;
    card.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
  });
  
  document.addEventListener('mouseleave', () => {
    card.style.transform = `rotateY(0deg) rotateX(0deg)`;
  });
}
</script>

</body>
</html>
